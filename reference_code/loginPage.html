<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e2e2e2",
                        "primary-container": "#e21d1d",
                        "on-error-container": "#93000a",
                        "background": "#fcf9f8",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#474746",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "on-primary-container": "#fff9f8",
                        "surface-bright": "#fcf9f8",
                        "secondary-container": "#e2dfde",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "on-primary-fixed-variant": "#930007",
                        "primary-fixed": "#ffdad5",
                        "inverse-primary": "#ffb4aa",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e5e2e1",
                        "outline-variant": "#e7bdb7",
                        "on-tertiary-fixed": "#1b1b1b",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-high": "#eae7e7",
                        "primary-fixed-dim": "#ffb4aa",
                        "secondary-fixed": "#e5e2e1",
                        "surface-container": "#f0eded",
                        "error": "#ba1a1a",
                        "tertiary-container": "#737373",
                        "surface-tint": "#c0000d",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#5d3f3b",
                        "surface-dim": "#dcd9d9",
                        "surface-container-highest": "#e5e2e1",
                        "outline": "#926e6a",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "inverse-surface": "#313030",
                        "tertiary": "#5a5a5a",
                        "surface": "#fcf9f8",
                        "on-tertiary-container": "#fafafa",
                        "primary": "#b9000c",
                        "on-primary-fixed": "#410001",
                        "on-background": "#1c1b1b",
                        "secondary": "#5f5e5e",
                        "on-secondary-container": "#636262"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        input:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background text-on-surface antialiased overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- Left Section: Architectural Imagery (The Void/Monolith Balance) -->
        <div class="hidden lg:flex w-7/12 relative bg-inverse-surface overflow-hidden">
            <div class="absolute inset-0 z-0 opacity-80">
                <img class="w-full h-full object-cover grayscale"
                    data-alt="Modern minimalist skyscraper architecture with sharp angles"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2BhvJL3SiOzIpq8i4nOGdnTZCvC6Ix18wxdwMo9btc967EPdh8gu0Oi3xcv2FhKpDNM5qq7llADOY-Tonu3yL3yFsO-jYnCN_2XuNC9lCcHoPVVdRZFWtvkqcFOc4I1VVA3gIKTmMXoPO1EGQBUvlcWGipGTKBuscm7ZrCTa_VCm2Zr1Bizz1CwSfASz5MeulOjOj1dsZl_Y9_KJkwAX2-amePP0dNOSCUHOrxTEFdT19OC7r1tn8tH0dNQ2L8lbTsRoZIg4ct64" />
            </div>
            <div
                class="absolute inset-0 z-10 bg-gradient-to-tr from-inverse-surface via-transparent to-transparent opacity-60">
            </div>
            <div class="relative z-20 flex flex-col justify-between p-20 w-full">
                <div>
                    <span class="text-primary-container label-md uppercase tracking-[0.2em] font-bold">EST.
                        MMXXIV</span>
                    <h1 class="text-surface text-[4rem] font-black leading-none tracking-tighter mt-4 uppercase">
                        BOXWAY<br />STUDIO
                    </h1>
                </div>
                <div class="flex flex-col gap-6">
                    <div class="h-[1px] w-24 bg-primary"></div>
                    <p
                        class="text-surface-variant max-w-md font-light leading-relaxed tracking-wide text-sm uppercase italic">
                        "Precision is not an attribute; it is the fundamental structure of the modern environment."
                    </p>
                </div>
            </div>
        </div>
        <!-- Right Section: Authentication Canvas -->
        <div
            class="w-full lg:w-5/12 flex flex-col justify-center items-center px-8 sm:px-16 lg:px-24 bg-surface relative">
            <!-- Mobile Brand Indicator -->
            <div class="lg:hidden absolute top-12 left-12">
                <span class="text-on-surface font-black tracking-tighter text-2xl uppercase">BOXWAY STUDIO</span>
            </div>
            <div class="w-full max-w-md">
                <header class="mb-12">
                    <h2 class="text-3xl font-bold tracking-tighter text-on-surface uppercase mb-2">Access Portal</h2>
                    <p class="text-on-surface-variant text-xs uppercase tracking-widest font-medium">Internal Project
                        Environment</p>
                </header>
                <!-- Role Selector Tabs -->
                <div class="flex gap-0 mb-10 border-b border-surface-container-highest">
                    <button
                        class="flex-1 pb-4 text-[0.7rem] font-black uppercase tracking-[0.1em] border-b-2 border-primary text-on-surface transition-all">
                        Admin Login
                    </button>
                    <button
                        class="flex-1 pb-4 text-[0.7rem] font-black uppercase tracking-[0.1em] border-b-2 border-transparent text-on-surface-variant opacity-40 hover:opacity-100 transition-all">
                        Architect Login
                    </button>
                </div>
                <!-- Login Form -->
                <form class="space-y-8">
                    <div class="space-y-6">
                        <div class="relative group">
                            <label
                                class="block text-[0.65rem] uppercase tracking-widest font-bold text-on-surface-variant mb-1 ml-0 transition-colors group-focus-within:text-primary">
                                Username or Institutional Email
                            </label>
                            <input
                                class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:border-primary transition-all text-sm font-medium text-on-surface placeholder:text-surface-dim"
                                placeholder="j.doe@boxway.studio" type="email" />
                        </div>
                        <div class="relative group">
                            <label
                                class="block text-[0.65rem] uppercase tracking-widest font-bold text-on-surface-variant mb-1 ml-0 transition-colors group-focus-within:text-primary">
                                Password
                            </label>
                            <input
                                class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:border-primary transition-all text-sm font-medium text-on-surface placeholder:text-surface-dim"
                                placeholder="••••••••••••" type="password" />
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input
                                class="w-4 h-4 border-2 border-outline-variant text-primary rounded-none focus:ring-0"
                                type="checkbox" />
                            <span
                                class="text-[0.65rem] uppercase tracking-widest font-bold text-on-surface-variant group-hover:text-on-surface transition-colors">Keep
                                Session Active</span>
                        </label>
                        <a class="text-[0.65rem] uppercase tracking-widest font-bold text-primary hover:opacity-70 transition-opacity"
                            href="#">
                            Forgot Credentials?
                        </a>
                    </div>
                    <div class="pt-4 space-y-4">
                        <button
                            class="w-full bg-primary text-on-primary py-5 text-[0.75rem] font-black tracking-[0.2em] uppercase hover:bg-primary-container transition-all flex items-center justify-center gap-3 group"
                            type="submit">
                            LOG IN
                            <span
                                class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                        <button
                            class="w-full bg-surface-container-high text-on-surface py-5 text-[0.75rem] font-black tracking-[0.2em] uppercase hover:bg-surface-variant transition-all"
                            type="button">
                            Request Studio Access
                        </button>
                    </div>
                </form>
                <!-- Footer Metadata -->
                <footer class="mt-20 pt-8 border-t border-surface-container-low flex justify-between items-center">
                    <span
                        class="text-[0.6rem] text-on-surface-variant font-medium tracking-[0.15em] uppercase opacity-50">
                        © 2024 Boxway Studio
                    </span>
                    <div class="flex gap-6">
                        <a class="text-[0.6rem] text-on-surface-variant font-bold tracking-[0.15em] uppercase hover:text-primary transition-colors"
                            href="#">Security</a>
                        <a class="text-[0.6rem] text-on-surface-variant font-bold tracking-[0.15em] uppercase hover:text-primary transition-colors"
                            href="#">Privacy</a>
                    </div>
                </footer>
            </div>
        </div>
    </div>
    <!-- Minimal Help Float -->
    <div class="fixed bottom-10 right-10 z-50">
        <button
            class="bg-inverse-surface text-inverse-on-surface w-12 h-12 flex items-center justify-center hover:bg-on-surface transition-all shadow-xl group">
            <span class="material-symbols-outlined text-lg" data-icon="help_outline">help_outline</span>
        </button>
    </div>
</body>

</html>
