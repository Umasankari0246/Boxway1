<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#DC2626", /* Red accent for BOXWAY brand */
                        "background-light": "#f7f7f6",
                        "background-dark": "#181b17",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-slate-900/40 font-display flex items-center justify-center min-h-screen p-4">
    <!-- Modal Container -->
    <div
        class="bg-white dark:bg-background-dark w-full max-w-4xl shadow-2xl rounded-xl overflow-hidden flex flex-col max-h-[921px]">
        <!-- Header -->
        <header class="border-b border-slate-100 dark:border-slate-800 px-8 py-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-xl">inventory_2</span>
                    </div>
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">BOXWAY</h2>
                </div>
                <button class="text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">New Employee Registration</h1>
                    <span class="text-sm font-semibold text-slate-500">Step 1 of 4</span>
                </div>
                <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div class="bg-primary h-full w-1/4 rounded-full"></div>
                </div>
            </div>
        </header>
        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-8 space-y-10">
            <!-- Section 1: Personal Details -->
            <section>
                <div class="flex items-center gap-2 mb-6 border-b border-slate-50 pb-2">
                    <span class="material-symbols-outlined text-primary">person</span>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Personal
                        Details</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <!-- Profile Photo -->
                    <div class="md:col-span-3 flex flex-col items-center justify-start pt-2">
                        <div class="relative group">
                            <div
                                class="size-32 rounded-full bg-slate-100 dark:bg-slate-800 border-4 border-white dark:border-slate-700 shadow-sm flex items-center justify-center overflow-hidden">
                                <span class="material-symbols-outlined text-4xl text-slate-300">account_circle</span>
                            </div>
                            <button
                                class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg hover:bg-red-700 transition-colors">
                                <span class="material-symbols-outlined text-sm">photo_camera</span>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 mt-3 text-center">Upload Profile Photo</p>
                    </div>
                    <!-- Personal Form Fields -->
                    <div class="md:col-span-9 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">First Name</label>
                            <input
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                placeholder="e.g. John" type="text" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Last Name</label>
                            <input
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                placeholder="e.g. Doe" type="text" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Employee ID</label>
                            <input
                                class="rounded bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500 font-mono"
                                readonly="" type="text" value="BW-2024-001" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Date of
                                Birth</label>
                            <input
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                type="date" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Blood Group</label>
                            <select
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary">
                                <option>Select</option>
                                <option>A+</option>
                                <option>A-</option>
                                <option>B+</option>
                                <option>B-</option>
                                <option>O+</option>
                                <option>O-</option>
                                <option>AB+</option>
                                <option>AB-</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Phone Number</label>
                            <input
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                placeholder="+1 (555) 000-0000" type="tel" />
                        </div>
                        <div class="flex flex-col gap-1 sm:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email
                                Address</label>
                            <input
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                placeholder="john.doe@company.com" type="email" />
                        </div>
                        <div class="flex flex-col gap-1 sm:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Residential
                                Address</label>
                            <textarea
                                class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                                placeholder="Street name, Apartment, City, Postal Code" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </section>
            <!-- Section 2: Family & Emergency Contact -->
            <section>
                <div class="flex items-center gap-2 mb-6 border-b border-slate-50 pb-2">
                    <span class="material-symbols-outlined text-primary">emergency</span>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Family
                        &amp; Emergency Contact</h3>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Father's Name</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            type="text" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Father's Phone</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            type="tel" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mother's Name</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            type="text" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mother's Phone</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            type="tel" />
                    </div>
                    <div class="flex flex-col gap-1 sm:col-span-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Family Permanent
                            Address</label>
                        <textarea
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            rows="2"></textarea>
                    </div>
                </div>
            </section>
            <!-- Section 3: Marital Status -->
            <section>
                <div class="flex items-center gap-2 mb-6 border-b border-slate-50 pb-2">
                    <span class="material-symbols-outlined text-primary">favorite</span>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Marital
                        Status</h3>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Status</label>
                        <select
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary">
                            <option value="single">Single</option>
                            <option selected="" value="married">Married</option>
                            <option value="divorced">Divorced</option>
                            <option value="widowed">Widowed</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Spouse Name</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            placeholder="Full Name" type="text" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Spouse Phone</label>
                        <input
                            class="rounded border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-primary focus:border-primary"
                            placeholder="Phone Number" type="tel" />
                    </div>
                </div>
            </section>
        </div>
        <!-- Footer -->
        <footer
            class="border-t border-slate-100 dark:border-slate-800 px-8 py-6 bg-slate-50 dark:bg-slate-900/50 flex justify-between items-center">
            <button
                class="px-6 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 rounded transition-colors uppercase tracking-wide">
                Cancel
            </button>
            <div class="flex gap-4">
                <button
                    class="bg-primary hover:bg-red-700 text-white px-8 py-2.5 rounded font-bold text-sm flex items-center gap-2 transition-all uppercase tracking-wide">
                    Next Step
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </div>
        </footer>
    </div>
</body>

</html>
