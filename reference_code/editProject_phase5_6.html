<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a6841",
                        "background-light": "#f7f7f6",
                        "background-dark": "#181b17",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%234a6841' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <div class="px-4 md:px-20 lg:px-40 flex flex-1 justify-center py-5">
                <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
                    <header
                        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-4 py-3">
                        <div class="flex items-center gap-4">
                            <div class="size-6 text-primary">
                                <span class="material-symbols-outlined text-3xl">architecture</span>
                            </div>
                            <h2 class="text-xl font-bold leading-tight tracking-tight uppercase">BOXWAY</h2>
                        </div>
                        <button
                            class="flex size-10 cursor-pointer items-center justify-center rounded-lg bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </header>
                    <div
                        class="flex flex-col gap-4 p-6 bg-white dark:bg-zinc-900/50 mt-6 rounded-xl border border-primary/5 shadow-sm">
                        <div class="flex gap-6 justify-between items-end">
                            <div class="flex flex-col">
                                <p class="text-primary text-sm font-semibold uppercase tracking-wider">Step 3 of 5</p>
                                <h1 class="text-3xl font-bold leading-tight mt-1">Project Development</h1>
                            </div>
                            <p class="text-primary font-bold">60%</p>
                        </div>
                        <div class="w-full rounded-full bg-primary/10 h-2.5">
                            <div class="h-2.5 rounded-full bg-primary" style="width: 60%;"></div>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 text-sm">Manage design stages and consultant
                            coordination</p>
                    </div>
                    <div class="mt-8 space-y-10">
                        <section>
                            <div class="flex items-center gap-3 px-4 pb-4">
                                <span class="material-symbols-outlined text-primary">draw</span>
                                <h2 class="text-xl font-bold">Stage 5: Design Development</h2>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4">
                                <label class="flex flex-col gap-2">
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Status</span>
                                    <select
                                        class="form-select h-12 rounded-lg border-primary/20 bg-white dark:bg-zinc-900 focus:border-primary focus:ring-primary">
                                        <option value="">Select development status</option>
                                        <option value="not-started">Not Started</option>
                                        <option value="in-progress">In Progress</option>
                                        <option value="review">Under Client Review</option>
                                        <option value="approved">Approved</option>
                                    </select>
                                </label>
                                <div class="flex flex-col gap-2">
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Technical
                                        Drawings</span>
                                    <div class="flex items-center justify-center w-full">
                                        <label
                                            class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-primary/20 rounded-lg cursor-pointer bg-primary/5 hover:bg-primary/10 transition-colors">
                                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                                <span
                                                    class="material-symbols-outlined text-primary mb-2">cloud_upload</span>
                                                <p class="text-xs text-slate-500 dark:text-slate-400">Click to upload or
                                                    drag and drop</p>
                                                <p class="text-[10px] text-slate-400 uppercase mt-1">PDF, DWG (Max 50MB)
                                                </p>
                                            </div>
                                            <input class="hidden" type="file" />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <section class="pb-12">
                            <div class="flex items-center gap-3 px-4 pb-4">
                                <span class="material-symbols-outlined text-primary">groups</span>
                                <h2 class="text-xl font-bold">Stage 6: Consultant Engagement</h2>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4">
                                <label class="flex flex-col gap-2">
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Structural
                                        Consultant</span>
                                    <input
                                        class="form-input h-12 rounded-lg border-primary/20 bg-white dark:bg-zinc-900 focus:border-primary focus:ring-primary placeholder:text-slate-400"
                                        placeholder="Search or assign firm..." type="text" />
                                </label>
                                <label class="flex flex-col gap-2">
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">MEP
                                        Consultant</span>
                                    <input
                                        class="form-input h-12 rounded-lg border-primary/20 bg-white dark:bg-zinc-900 focus:border-primary focus:ring-primary placeholder:text-slate-400"
                                        placeholder="Search or assign firm..." type="text" />
                                </label>
                                <label class="flex flex-col gap-2">
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Engagement
                                        Status</span>
                                    <select
                                        class="form-select h-12 rounded-lg border-primary/20 bg-white dark:bg-zinc-900 focus:border-primary focus:ring-primary">
                                        <option value="">Select engagement stage</option>
                                        <option value="tendering">Tendering</option>
                                        <option value="appointed">Appointed</option>
                                        <option value="briefing">Briefing Stage</option>
                                        <option value="coordinating">Active Coordination</option>
                                    </select>
                                </label>
                                <div class="md:col-span-2">
                                    <label class="flex flex-col gap-2">
                                        <span
                                            class="text-sm font-medium text-slate-700 dark:text-slate-300">Coordination
                                            Notes</span>
                                        <textarea
                                            class="form-textarea rounded-lg border-primary/20 bg-white dark:bg-zinc-900 focus:border-primary focus:ring-primary placeholder:text-slate-400"
                                            placeholder="Detail specific consultant requirements or meeting outcomes..."
                                            rows="4"></textarea>
                                    </label>
                                </div>
                            </div>
                        </section>
                    </div>
                    <footer
                        class="flex items-center justify-between gap-4 border-t border-primary/10 py-8 px-4 mt-auto">
                        <button
                            class="flex items-center gap-2 px-6 h-12 text-slate-600 dark:text-slate-400 font-semibold hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">arrow_back</span>
                            Previous
                        </button>
                        <div class="flex gap-4">
                            <button
                                class="px-6 h-12 rounded-lg border border-primary/20 text-primary font-semibold hover:bg-primary/5 transition-colors">
                                Save Progress
                            </button>
                            <button
                                class="px-8 h-12 rounded-lg bg-primary text-white font-bold hover:bg-opacity-90 transition-all shadow-md">
                                Next Step
                            </button>
                        </div>
                    </footer>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
